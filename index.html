<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala do Café</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

.container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
    display:flex;
    flex-direction:column;
}

.input-area{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#27ae60;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#219150;
}

.day{
    border:2px dashed #dcdde1;
    border-radius:10px;
    padding:15px;
    margin-bottom:10px;
    background:white;
}

.day-title{
    font-weight:bold;
    margin-bottom:8px;
    color:#34495e;
}

.person{
    background:#3498db;
    color:white;
    padding:10px;
    border-radius:8px;
    cursor:grab;
    text-align:center;
}

.person:active{
    cursor:grabbing;
}

.queue{
    min-height:200px;
    border:2px dashed #dcdde1;
    border-radius:10px;
    padding:10px;
    margin-bottom:15px;
}

.queue .person{
    margin-bottom:8px;
}

/* Estilo da área de apagar */
.trash-zone {
    border: 2px dashed #e74c3c;
    background: #fdf2f2;
    color: #e74c3c;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}

.trash-zone.dragover {
    background: #f9d5d5;
}

.today{
    border-color:#27ae60;
    background:#f0fff5;
}

.empty{
    color:#999;
    text-align:center;
    padding:10px;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<h1>☕ Escala do Café</h1>

<div class="container">

    <div class="card">
        <h2>Semana</h2>
        <br>

        <div class="day" data-index="0">
            <div class="day-title">Segunda</div>
            <div class="slot"></div>
        </div>

        <div class="day" data-index="1">
            <div class="day-title">Terça</div>
            <div class="slot"></div>
        </div>

        <div class="day" data-index="2">
            <div class="day-title">Quarta</div>
            <div class="slot"></div>
        </div>

        <div class="day" data-index="3">
            <div class="day-title">Quinta</div>
            <div class="slot"></div>
        </div>

        <div class="day" data-index="4">
            <div class="day-title">Sexta</div>
            <div class="slot"></div>
        </div>

        <div class="day" data-index="5">
            <div class="day-title">Sábado</div>
            <div class="slot"></div>
        </div>
    </div>

    <div class="card">
        <h2>Fila</h2>
        <br>

        <div class="input-area">
            <input
                id="newName"
                placeholder="Novo funcionário"
            >
            <button onclick="addPerson()">
                Adicionar
            </button>
        </div>

        <div id="queue" class="queue"></div>

        <div id="trashZone" class="trash-zone">
            🗑️ Arraste aqui para Apagar
        </div>
    </div>

</div>

<script>
// Carrega os dados do navegador
let employees = JSON.parse(localStorage.getItem("cafeFila")) || [];

// Salva a lista na memória do navegador
function save(){
    localStorage.setItem("cafeFila", JSON.stringify(employees));
}

function addPerson(){
    const input = document.getElementById("newName");
    const name = input.value.trim();

    if(!name) return;

    const exists = employees.some(
        p => p && p.toLowerCase() === name.toLowerCase()
    );

    if(exists){
        alert("Nome já cadastrado.");
        return;
    }

    employees.push(name);
    input.value = "";

    save();
    render();
}

function createPerson(name, index){
    const div = document.createElement("div");
    div.className = "person";
    div.draggable = true;
    div.dataset.index = index;
    div.textContent = name;

    div.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", index);
    });

    return div;
}

function render(){
    document.querySelectorAll(".slot").forEach(slot => slot.innerHTML="");
    const queue = document.getElementById("queue");
    queue.innerHTML="";

    for(let i=0; i<6; i++){
        const slot = document.querySelector(`.day[data-index="${i}"] .slot`);

        if(employees[i]){
            slot.appendChild(createPerson(employees[i], i));
        } else {
            slot.innerHTML = '<div class="empty">Vazio</div>';
        }
    }

    for(let i=6; i<employees.length; i++){
        if (employees[i]) {
            queue.appendChild(createPerson(employees[i], i));
        }
    }

    if(employees.filter((p, idx) => idx >= 6 && p !== null).length === 0){
        queue.innerHTML = '<div class="empty">Sem fila de espera</div>';
    }
}

// Drag and Drop nos dias da semana
document.querySelectorAll(".day").forEach(day => {
    day.addEventListener("dragover", e => e.preventDefault());
    day.addEventListener("drop", e => {
        e.preventDefault();
        const from = Number(e.dataTransfer.getData("text/plain"));
        const to = Number(day.dataset.index);

        if (employees[to] === undefined) {
            employees[to] = null;
        }

        [employees[from], employees[to]] = [employees[to], employees[from]];
        
        limparPontasNulas();
        save();
        render();
    });
});

// Drag and Drop de volta para a fila
document.getElementById("queue").addEventListener("dragover", e => e.preventDefault());
document.getElementById("queue").addEventListener("drop", e => {
    e.preventDefault();
    const from = Number(e.dataTransfer.getData("text/plain"));

    if(from < 6){
        const item = employees.splice(from, 1)[0];
        employees.splice(from, 0, null);
        employees.push(item);
        
        limparPontasNulas();
        save();
        render();
    }
});

// Configuração da Lixeira (Apagar Nomes)
const trashZone = document.getElementById("trashZone");

trashZone.addEventListener("dragover", e => {
    e.preventDefault();
    trashZone.classList.add("dragover");
});

trashZone.addEventListener("dragleave", () => {
    trashZone.classList.remove("dragover");
});

trashZone.addEventListener("drop", e => {
    e.preventDefault();
    trashZone.classList.remove("dragover");
    
    const from = Number(e.dataTransfer.getData("text/plain"));
    
    if (from < 6) {
        // Se estava nos dias da semana, vira Vazio
        employees[from] = null;
    } else {
        // Se estava na fila, remove permanentemente
        employees.splice(from, 1);
    }

    limparPontasNulas();
    save();
    render();
});

function limparPontasNulas() {
    while(employees.length > 0 && employees[employees.length - 1] === null) {
        employees.pop();
    }
}

document.getElementById("newName").addEventListener("keypress", e => {
    if(e.key === "Enter"){
        addPerson();
    }
});

// Destacar o dia atual automaticamente
const today = new Date().getDay();
const map = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5 };

if(map[today] !== undefined){
    document.querySelector(`.day[data-index="${map[today]}"]`).classList.add("today");
}

render();
</script>
</body>
</html>
