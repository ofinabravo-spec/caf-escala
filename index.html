<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escala do Café</title>

<script src="https://code.dragdroptouch.com/DragDropTouch.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
}

body{
    background:#f4f6f9;
    overflow-x: hidden;
}

/* Indicador visual de qual tela está ativa */
.tabs-indicator {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 15px 0 5px 0;
    background: #fff;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #cbd5e1;
    transition: background 0.3s;
}

.dot.active {
    background: #3498db;
    width: 20px;
    border-radius: 5px;
}

/* Container do Carrossel de Telas */
.carousel-view {
    width: 100vw;
    overflow: hidden;
}

.carousel-container {
    display: flex;
    width: 200vw; 
    transition: transform 0.3s ease-out;
}

/* Cada tela individual */
.screen {
    width: 100vw;
    padding: 15px;
    flex-shrink: 0;
    min-height: 85vh;
}

h1{
    text-align:center;
    margin-bottom:15px;
    color:#2c3e50;
    font-size: 22px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
    display:flex;
    flex-direction:column;
    height: 100%;
}

.input-area{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size: 16px;
    -webkit-user-select: text;
    user-select: text;
}

button{
    padding:12px 15px;
    border:none;
    border-radius:8px;
    background:#27ae60;
    color:white;
    font-weight: bold;
}

.day{
    border:2px dashed #dcdde1;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    background:white;
    min-height: 70px;
}

.day-title{
    font-weight:bold;
    margin-bottom:6px;
    color:#34495e;
    font-size: 14px;
}

.person {
    background:#3498db;
    color:white;
    padding:12px;
    border-radius:8px;
    cursor:grab;
    text-align:center;
    font-weight: bold;
    touch-action: none; 
}

.person:active{
    cursor:grabbing;
    opacity: 0.7;
}

.queue{
    min-height:180px;
    border:2px dashed #dcdde1;
    border-radius:10px;
    padding:10px;
    margin-bottom:15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.trash-zone {
    border: 2px dashed #e74c3c;
    background: #fdf2f2;
    color: #e74c3c;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    font-weight: bold;
    margin-top: auto;
}

.trash-zone.dragover {
    background: #f9d5d5;
}

.today{
    border-color:#27ae60;
    background:#f0fff5;
}

.empty{
    color:#94a3b8;
    text-align:center;
    padding:8px;
    font-style: italic;
    font-size: 14px;
}

.hint-swipe {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    margin-top: 5px;
}
</style>
</head>
<body>

    <div class="tabs-indicator">
        <div id="dot0" class="dot active"></div>
        <div id="dot1" class="dot"></div>
    </div>

    <h1>☕ Escala do Café</h1>

    <div class="carousel-view" id="touchArea">
        <div class="carousel-container" id="carousel">
            
            <div class="screen">
                <div class="card">
                    <h2>Semana</h2>
                    <div class="hint-swipe">Arraste para os lados para mudar / para baixo para apagar</div>
                    <br>

                    <div class="day" data-index="0">
                        <div class="day-title">Segunda</div>
                        <div class="slot"></div>
                    </div>

                    <div class="day" data-index="1">
                        <div class="day-title">Terça</div>
                        <div class="slot"></div>
                    </div>

                    <div class="day" data-index="2">
                        <div class="day-title">Quarta</div>
                        <div class="slot"></div>
                    </div>

                    <div class="day" data-index="3">
                        <div class="day-title">Quinta</div>
                        <div class="slot"></div>
                    </div>

                    <div class="day" data-index="4">
                        <div class="day-title">Sexta</div>
                        <div class="slot"></div>
                    </div>

                    <div class="day" data-index="5">
                        <div class="day-title">Sábado</div>
                        <div class="slot"></div>
                    </div>
                </div>
            </div>

            <div class="screen">
                <div class="card">
                    <h2>Fila de Espera</h2>
                    <div class="hint-swipe">Arraste para baixo para apagar o funcionário</div>
                    
                    <div class="input-area">
                        <input id="newName" placeholder="Novo funcionário">
                        <button onclick="addPerson()">Adicionar</button>
                    </div>

                    <div id="queue" class="queue"></div>

                    <div id="trashZone" class="trash-zone">
                        🗑️ Ou solte aqui para Apagar
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
// --- LÓGICA DO SWIPE E DRAG DOWN (MUDAR TELA OU APAGAR) ---
let startX = 0;
let startY = 0; // Adicionado para rastrear o movimento vertical
let currentScreen = 0;
let draggedItemIndex = null; // Guarda quem está sendo arrastado atualmente

const carousel = document.getElementById("carousel");
const touchArea = document.getElementById("touchArea");

touchArea.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    // Se o usuário tocou em um bloco de funcionário, memoriza o índice dele
    if (e.target.classList.contains("person")) {
        draggedItemIndex = Number(e.target.dataset.index);
    } else {
        draggedItemIndex = null;
    }
}, { passive: true });

touchArea.addEventListener("touchend", e => {
    if (startX === 0 || startY === 0) return;
    
    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;
    
    let diffX = startX - endX;
    let diffY = startY - endY;

    // NOVO: Se o movimento para baixo for maior que 100px E o usuário estava segurando um funcionário, EXCLUI!
    if (diffY < -100 && draggedItemIndex !== null) {
        excluirFuncionario(draggedItemIndex);
        startX = 0;
        startY = 0;
        draggedItemIndex = null;
        return;
    }

    // Se não foi arrasto para baixo, verifica se foi arrasto lateral para mudar de tela
    if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 0 && currentScreen === 0) {
            currentScreen = 1; 
        } else if (diffX < 0 && currentScreen === 1) {
            currentScreen = 0; 
        }
        updateScreenView();
    }
    
    startX = 0;
    startY = 0;
    draggedItemIndex = null;
});

function updateScreenView() {
    carousel.style.transform = `translateX(-${currentScreen * 100}vw)`;
    document.getElementById("dot0").classList.toggle("active", currentScreen === 0);
    document.getElementById("dot1").classList.toggle("active", currentScreen === 1);
}

// Função centralizada para deletar o funcionário
function excluirFuncionario(index) {
    if (index < 6) {
        employees[index] = null; // Esvazia o dia da semana
    } else {
        employees.splice(index, 1); // Remove definitivo da fila
    }
    limparPontasNulas(); 
    save(); 
    render();
}

// --- LÓGICA DO SISTEMA DA ESCALA DO CAFÉ ---
let employees = JSON.parse(localStorage.getItem("cafeFila")) || [];

function save(){
    localStorage.setItem("cafeFila", JSON.stringify(employees));
}

function addPerson(){
    const input = document.getElementById("newName");
    const name = input.value.trim();
    if(!name) return;

    const exists = employees.some(p => p && p.toLowerCase() === name.toLowerCase());
    if(exists){ alert("Nome já cadastrado."); return; }

    employees.push(name);
    input.value = "";
    save();
    render();
}

function createPerson(name, index){
    const div = document.createElement("div");
    div.className = "person";
    div.draggable = true;
    div.dataset.index = index;
    div.textContent = name;
    div.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", index);
    });
    return div;
}

function render(){
    document.querySelectorAll(".slot").forEach(slot => slot.innerHTML="");
    const queue = document.getElementById("queue");
    queue.innerHTML="";

    for(let i=0; i<6; i++){
        const slot = document.querySelector(`.day[data-index="${i}"] .slot`);
        if(employees[i]){
            slot.appendChild(createPerson(employees[i], i));
        } else {
            slot.innerHTML = '<div class="empty">Vazio</div>';
        }
    }

    for(let i=6; i<employees.length; i++){
        if (employees[i]) {
            queue.appendChild(createPerson(employees[i], i));
        }
    }

    if(employees.filter((p, idx) => idx >= 6 && p !== null).length === 0){
        queue.innerHTML = '<div class="empty">Sem fila de espera</div>';
    }
}

// Eventos de Drop nos dias da Semana
document.querySelectorAll(".day").forEach(day => {
    day.addEventListener("dragover", e => e.preventDefault());
    day.addEventListener("drop", e => {
        e.preventDefault();
        const from = Number(e.dataTransfer.getData("text/plain"));
        const to = Number(day.dataset.index);
        if (employees[to] === undefined) employees[to] = null;
        [employees[from], employees[to]] = [employees[to], employees[from]];
        limparPontasNulas(); save(); render();
    });
});

// Eventos de Drop na Fila de Espera
document.getElementById("queue").addEventListener("dragover", e => e.preventDefault());
document.getElementById("queue").addEventListener("drop", e => {
    e.preventDefault();
    const from = Number(e.dataTransfer.getData("text/plain"));
    
    if(from < 6){
        const item = employees.splice(from, 1)[0];
        employees.splice(from, 0, null);
        employees.push(item);
    } else {
        const item = employees.splice(from, 1)[0];
        employees.push(item);
    }
    limparPontasNulas(); save(); render();
});

// Eventos tradicionais da Lixeira por Drop clássico
const trashZone = document.getElementById("trashZone");
trashZone.addEventListener("dragover", e => { e.preventDefault(); trashZone.classList.add("dragover"); });
trashZone.addEventListener("dragleave", () => trashZone.classList.remove("dragover"));
trashZone.addEventListener("drop", e => {
    e.preventDefault();
    trashZone.classList.remove("dragover");
    const from = Number(e.dataTransfer.getData("text/plain"));
    excluirFuncionario(from);
});

function limparPontasNulas() {
    while(employees.length > 0 && employees[employees.length - 1] === null) employees.pop();
}

document.getElementById("newName").addEventListener("keypress", e => {
    if(e.key === "Enter") addPerson();
});

const today = new Date().getDay();
const map = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5 };
if(map[today] !== undefined) document.querySelector(`.day[data-index="${map[today]}"]`).classList.add("today");

render();
</script>
</body>
</html>
